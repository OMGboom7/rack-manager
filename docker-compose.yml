services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rack
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rack-manager-pg}
      POSTGRES_DB: rack_manager
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rack -d rack_manager"]
      interval: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://rack:${DB_PASSWORD:-rack-manager-pg}@db:5432/rack_manager
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "${PORT:-80}:80"
    restart: unless-stopped

volumes:
  pgdata:
